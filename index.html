<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>I'm Sorry, My Pookie ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
    body{
      min-height:100dvh;
      background:linear-gradient(180deg,#ffe4ec,#fff0f5,#ffffff);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      text-align:center;
      padding:clamp(16px,4vw,28px);
    }

    h1{
      color:#e11d48;
      font-size:clamp(1.8rem,7vw,3rem);
      line-height:1.2;
    }

    p{
      max-width:520px;
      color:#444;
      margin:18px auto;
      font-size:clamp(0.95rem,4vw,1.2rem);
    }

    /* Floating hearts */
    .heart{
      position:fixed;
      bottom:-40px;
      color:#ff4d6d;
      animation:float 10s linear infinite;
      opacity:.7;
      pointer-events:none;
      z-index:0;
    }
    @keyframes float{
      0%{transform:translateY(0) scale(.6);opacity:0}
      20%{opacity:1}
      100%{transform:translateY(-110vh) scale(1.2);opacity:0}
    }

    .btn-wrap{
      position:relative;
      width:100%;
      max-width:420px;
      height:160px;
      margin-top:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      z-index:2;
    }

    .btn{
      background:#e11d48;
      color:#fff;
      border:none;
      padding:16px 22px;
      font-size:clamp(1rem,4.5vw,1.2rem);
      border-radius:14px;
      cursor:pointer;
      box-shadow:0 10px 20px rgba(225,29,72,.3);
      transition:.25s;
      min-width:150px;
      touch-action:manipulation;
    }
    .btn:active{transform:scale(.96)}

    #noBtn{background:#9ca3af;position:absolute}

    /* Overlay */
    .overlay{
      position:fixed;inset:0;background:rgba(255,255,255,.92);
      backdrop-filter:blur(6px);
      display:none;align-items:center;justify-content:center;flex-direction:column;
      padding:20px;
      z-index:5;
    }
    .overlay.show{display:flex}
    .overlay h2{
      color:#e11d48;
      font-size:clamp(1.5rem,6vw,2.2rem);
      text-align:center;
    }

    .boom{position:absolute;color:#e11d48;animation:boom 2s forwards}
    @keyframes boom{
      from{transform:scale(0) translate(0,0);opacity:1}
      to{transform:scale(1.6) translate(var(--x),var(--y));opacity:0}
    }
  </style>
</head>
<body>

  <h1>I’m Sorry, My Pookie ❤️</h1>
  <p>
    I know I messed up… but you mean the world to me. Every moment with you is my favorite.
    Please forgive your idiot who loves you endlessly 💌
  </p>

  <div class="btn-wrap" id="btnArea">
    <button class="btn" onclick="forgive()">Yes, I Forgive You ❤️</button>
    <button class="btn" id="noBtn" onmouseover="moveNo()" ontouchstart="moveNo()">No 😤</button>
  </div>

  <div id="overlay" class="overlay">
    <h2>YAY! Thank you for forgiving me 🥺❤️</h2>
  </div>

  <audio autoplay loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9f4b44.mp3?filename=romantic-ambient-11087.mp3">
  </audio>

  <script>
    // floating hearts
    function createHeart(){
      const h=document.createElement('div');
      h.className='heart';
      h.innerHTML='❤';
      h.style.left=Math.random()*100+'vw';
      h.style.fontSize=(14+Math.random()*22)+'px';
      h.style.animationDuration=(6+Math.random()*6)+'s';
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),12000);
    }
    setInterval(createHeart,550);

    // Runaway No button (mobile safe)
    function moveNo(){
      const btn=document.getElementById('noBtn');
      const area=document.getElementById('btnArea');
      const rect=area.getBoundingClientRect();
      const maxX=rect.width-160;
      const maxY=rect.height-60;
      btn.style.left=Math.random()*Math.max(0,maxX)+'px';
      btn.style.top=Math.random()*Math.max(0,maxY)+'px';
    }

    // Forgive action with heart explosion
    function forgive(){
      const overlay=document.getElementById('overlay');
      overlay.classList.add('show');
      for(let i=0;i<45;i++){
        const b=document.createElement('div');
        b.className='boom';
        b.innerHTML='❤';
        b.style.setProperty('--x',(Math.random()-0.5)*800+'px');
        b.style.setProperty('--y',(Math.random()-0.5)*800+'px');
        overlay.appendChild(b);
        setTimeout(()=>b.remove(),2000);
      }
    }
  </script>

</body>
</html>
